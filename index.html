<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINT | Is Here</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & VARS --- */
        :root {
            --brand-dark: #31005e;
            --brand-text: #1d1d1f; /* Apple dark grey */
            --font-sans: 'Manrope', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            color: var(--brand-text);
            overflow-x: hidden;
            background-color: #f5f5f7;
        }

        /* --- Z-INDEX LAYERS --- */
        /* 1. The Background Image (Lowest) */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            background-image: url('HeroBG.jpg'); /* Ensure this file is in your repo */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 2. The Content (Middle) */
        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centers title vertically */
            text-align: center;
            padding: 20px;
        }

        /* 3. Bottom Left Image (Highest) */
        .overlay-sticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 300px; /* Adjust size as needed */
            height: auto;
            z-index: 9999;
            pointer-events: none; /* Allows clicking through it if needed */
        }
        
        @media (max-width: 768px) {
            .overlay-sticker { width: 180px; }
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 24px 40px;
            display: flex;
            justify-content: flex-start; /* Logo on left */
            align-items: center;
            z-index: 100;
        }

        .nav-logo {
            height: 40px;
            width: auto;
        }

        /* --- TYPOGRAPHY --- */
        h1.hero-title {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--brand-dark);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
            /* Webflow-style fade in */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.2s;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <nav>
        <img src="https://static.wixstatic.com/media/f82622_c476b77f4e3f4ab2bb0fa799b5b3e2ac~mv2.png" alt="MINT Logo" class="nav-logo">
    </nav>

    <main>
        <h1 class="hero-title">Mint is here.</h1>
    </main>

    <img src="Bottom left.png" alt="Overlay" class="overlay-sticker">

</body>
</html>
