<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINT | Is Here</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --brand-dark: #31005e;
            --brand-text: #1d1d1f;
            --glass-card: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            color: var(--brand-text);
            overflow: hidden; /* Prevent body scroll, handle content in containers */
            background-color: #f5f5f7;
            height: 100vh;
            width: 100vw;
        }

        /* --- ASSET LAYERS --- */
        
        /* 1. Background Image (Lowest Z-Index) */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('HeroBG.jpg'); /* Your Repo File */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 2. Bottom Left Overlay (Highest Z-Index) */
        .sticker-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 350px; /* Adjusted for visibility */
            max-width: 40vw;
            height: auto;
            z-index: 9999;
            pointer-events: none; /* Let clicks pass through */
        }

        /* --- UI LAYOUT --- */
        
        /* Navigation (Logo Only) */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            padding: 40px 60px;
            z-index: 100;
        }

        .nav-logo {
            height: 32px; /* Apple style: restrained sizing */
            width: auto;
        }

        /* Main Grid */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Split screen */
            height: 100vh;
            width: 100%;
            padding: 0 60px;
            align-items: center;
        }

        /* LEFT SIDE: Title */
        .left-content {
            z-index: 10;
            padding-right: 40px;
        }

        h1.hero-title {
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.03em; /* The "Apple" tight tracking */
            line-height: 1.05;
            color: var(--brand-text);
            
            /* Animation */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
        }

        /* RIGHT SIDE: Invisible Carousel */
        .right-content {
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden; /* Hide overflow from container */
            mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        .carousel-track {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 40px 20px; /* Padding for shadows */
            width: 100%;
            
            /* Hide Scrollbar */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE */
        }
        
        .carousel-track::-webkit-scrollbar { 
            display: none; /* Chrome/Safari */
        }

        /* Carousel Cards */
        .card {
            flex: 0 0 320px; /* Fixed width cards */
            height: 420px;
            scroll-snap-align: center;
            
            /* Glassmorphism */
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            
            /* Shadow */
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: transform 0.4s ease;
            cursor: grab;
        }

        .card:hover {
            transform: translateY(-5px);
        }
        
        .card:active { cursor: grabbing; }

        .card-icon {
            width: 48px;
            height: 48px;
            background: var(--brand-text);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }

        .card-footer {
            margin-top: auto;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--brand-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                padding: 0 24px;
                padding-top: 100px;
            }
            
            nav { padding: 24px; }
            
            .left-content { 
                padding-right: 0; 
                margin-bottom: 40px; 
                text-align: left;
            }
            
            .right-content {
                width: 100vw;
                margin-left: -24px; /* Break out of padding */
            }
            
            .carousel-track {
                padding-left: 24px; /* Restore visual padding */
            }
            
            .sticker-overlay {
                width: 200px;
            }
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <nav>
        <img src="https://static.wixstatic.com/media/f82622_7f62923a65f94af5b36b7958980b9ebc~mv2.png" alt="MINT Logo" class="nav-logo">
    </nav>

    <div class="main-container">
        
        <div class="left-content">
            <h1 class="hero-title">Mint is here.</h1>
        </div>

        <div class="right-content">
            <div class="carousel-track">
                
                <div class="card">
                    <div>
                        <div class="card-icon">I</div>
                        <h3>Invest</h3>
                        <p>Simple, quality investing tools designed to build long-term wealth.</p>
                    </div>
                    <div class="card-footer">
                        Learn more <span>&rarr;</span>
                    </div>
                </div>

                <div class="card">
                    <div>
                        <div class="card-icon">B</div>
                        <h3>Borrow</h3>
                        <p>Access future capital today with transparent, fair credit assessment.</p>
                    </div>
                    <div class="card-footer">
                        See options <span>&rarr;</span>
                    </div>
                </div>

                <div class="card">
                    <div>
                        <div class="card-icon">T</div>
                        <h3>Transact</h3>
                        <p>Move money in real-time. Secure, regulated, and seamless.</p>
                    </div>
                    <div class="card-footer">
                        Get started <span>&rarr;</span>
                    </div>
                </div>

                <div style="min-width: 20px;"></div>

            </div>
        </div>
    </div>

    <img src="Bottom left.png" alt="Overlay" class="sticker-overlay">

</body>
</html>
