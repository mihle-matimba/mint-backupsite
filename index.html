<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint | Apple Style UI</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
            color: #000;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px); /* Apple-style frosted glass */
        }

        /* Logo: Half size (18px) for a subtle, premium look */
        .logo img {
            height: 18px; 
            width: auto;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.7;
        }

        /* Hamburger Animation */
        .menu-toggle {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar {
            width: 24px;
            height: 1.5px;
            background: #000;
            transition: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .menu-toggle.active .bar:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
        .menu-toggle.active .bar:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        /* The Pinning Mechanism */
        .pin-container {
            height: 300vh; 
            position: relative;
        }

        #hero {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        /* Text Layer BEHIND the image */
        .hero-text-layer {
            position: absolute;
            z-index: 1;
            text-align: center;
            opacity: 0; /* Starts hidden */
            transform: scale(0.9); /* Starts slightly smaller for a zoom-in reveal */
            will-change: transform, opacity;
        }

        .hero-text-layer h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 600;
            letter-spacing: -0.04em;
            margin-bottom: 10px;
            color: #1d1d1f;
        }

        .hero-text-layer p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 400;
            color: #86868b; /* Apple's secondary text color */
        }

        /* Image Layer on TOP */
        .hero-image-wrapper {
            position: relative;
            z-index: 2; /* Sits above the text */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none; /* Allows text selection if needed */
        }

        .hero-image {
            width: 100%;
            max-width: 1200px;
            height: auto;
            transform: scale(4) translateY(50%);
            transform-origin: bottom center;
            will-change: transform;
        }

        /* Next Section */
        .next-section {
            height: 100vh;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="#hero" class="logo">
            <img src="images/ICON MINT.png" alt="Mint Logo">
        </a>
        <button class="menu-toggle">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </button>
    </header>

    <div class="pin-container">
        <section id="hero">
            <div class="hero-text-layer">
                <h1>MINT</h1>
                <p>Generative wealth, elegantly designed.</p>
            </div>

            <div class="hero-image-wrapper">
                <img src="images/HERO MAIN IMG.png" alt="Hero Image" class="hero-image">
            </div>
        </section>
    </div>

    <section class="next-section">
        <h2>Refined UI. Unmatched Speed.</h2>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const heroImage = document.querySelector('.hero-image');
            const heroText = document.querySelector('.hero-text-layer');
            const pinContainer = document.querySelector('.pin-container');
            const menuToggle = document.querySelector('.menu-toggle');

            menuToggle.addEventListener('click', () => menuToggle.classList.toggle('active'));

            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const maxScroll = pinContainer.offsetHeight - window.innerHeight;
                let progress = scrollY / maxScroll;

                if (progress > 1) progress = 1;
                if (progress < 0) progress = 0;

                // Image Animation: Scale 4 -> 1, Y 50% -> 0%
                const imgScale = 4 - (progress * 3);
                const imgY = 50 - (progress * 50);
                heroImage.style.transform = `scale(${imgScale}) translateY(${imgY}%)`;

                // Text Animation: Opacity 0 -> 1, Scale 0.9 -> 1
                // We multiply progress to make it fade in later in the scroll
                const textOpacity = progress > 0.3 ? (progress - 0.3) / 0.7 : 0;
                const textScale = 0.9 + (progress * 0.1);
                
                heroText.style.opacity = textOpacity;
                heroText.style.transform = `scale(${textScale})`;
            });
        });
    </script>
</body>
</html>
