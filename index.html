<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Mint | Financial Freedom through Technology</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="css/style.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Essential base styles to ensure it looks the same without Webflow scripts */
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .hero-section { display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .display-h1 { font-size: 4rem; font-weight: 800; line-height: 1.1; margin: 0; }
        .display-h1._02 { color: #00d63f; } /* Mint Brand Green */
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <a href="/" class="nav-logo">
                    <img src="images/mint-logo.svg" alt="Mint" class="site-logo"/>
                </a>
                <nav class="menu-wrapper">
                    <a href="#features" class="nav-link">Features</a>
                    <a href="#pricing" class="nav-link">Pricing</a>
                    <a href="/about" class="nav-link">About</a>
                    <a href="/sign-up" class="button-primary">Get Started</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <img src="images/cloud.svg" class="hero-bg-cloud" alt=""/>
        <div class="container-large">
            <div class="hero-content">
                <h1 class="display-h1">Manage Wealth</h1>
                <h1 class="display-h1 _02">Effortlessly</h1>
                <p class="hero-subtitle">Our AI-powered platform gives everyone access to wealth generation knowledge and technology.</p>
                <div class="hero-cta">
                    <a href="#" class="store-button"><img src="images/apple-icon.svg" alt=""/> App Store</a>
                    <a href="#" class="store-button"><img src="images/play-icon.svg" alt=""/> Play Store</a>
                </div>
            </div>
            <div class="hero-image-area">
                <img src="images/mint-app-hero.png" alt="Mint App" class="hero-main-image"/>
            </div>
        </div>
    </section>

    <section class="counter-section">
        <div class="container">
            <div class="counter-grid">
                <div class="stat-item">
                    <h2 class="stat-number">25k+</h2>
                    <p class="stat-label">Active Investors</p>
                </div>
                <div class="stat-item">
                    <h2 class="stat-number">R2.4B</h2>
                    <p class="stat-label">Assets Tracked</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <img src="images/mint-logo-white.svg" alt="Mint"/>
                <p>© 2026 Mint. Built for financial freedom.</p>
            </div>
        </div>
    </footer>

</body>
</html>
