<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint - Manage Your Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        .purple-accent { color: #7C3AED; }
        .bg-purple-accent { background-color: #7C3AED; }
        .border-purple-accent { border-color: #7C3AED; }

        /* Coming Soon Tooltip */
        .tooltip-container { position: relative; }
        .tooltip-text {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 5px 10px;
            border-radius: 6px;
            position: absolute;
            z-index: 1;
            bottom: -130%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Carousel Animation */
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .carousel-track {
            display: flex;
            width: max-content;
            animation: scroll 20s linear infinite;
        }

        .hero-gradient-text {
            background: linear-gradient(90deg, #111 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Phone mockup tilt */
        .phone-mockup {
            transform: rotate(-10deg) translateY(20px);
            transition: transform 0.5s ease;
        }
        .phone-mockup:hover {
            transform: rotate(-5deg) translateY(0px);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-12">
            <img src="images/LOGO 2 MINT.png" alt="Mint Logo" class="h-8">
            <div class="hidden md:flex items-center gap-8 text-gray-500 font-medium bg-gray-50 px-6 py-2 rounded-full border border-gray-100">
                <a href="#" class="text-black">• Home</a>
                <a href="#" class="hover:text-purple-600">Features</a>
                <a href="#" class="hover:text-purple-600">About</a>
                <a href="#" class="hover:text-purple-600">Pricing</a>
                <a href="#" class="hover:text-purple-600">Blog</a>
                <a href="#" class="hover:text-purple-600">All pages</a>
            </div>
        </div>
        
        <div class="tooltip-container">
            <button class="bg-purple-accent text-white px-6 py-3 rounded-full font-semibold opacity-80 cursor-not-allowed">
                Switch to Institution
            </button>
            <span class="tooltip-text">Coming soon</span>
        </div>
    </nav>

    <main class="relative pt-12 pb-32 overflow-hidden">
        <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            
            <div class="lg:col-span-4 z-10">
                <h1 class="text-6xl font-bold leading-[1.1] mb-8 text-gray-900">
                    Start Managing <br>
                    Your Finance <br>
                    <span class="text-gray-400">—</span> <span class="hero-gradient-text">With Our Tool</span>
                </h1>
                
                <button onclick="handleMintRedirect()" class="flex items-center gap-3 bg-gray-50 border border-gray-200 pl-6 pr-2 py-2 rounded-full hover:bg-white transition-all group">
                    <span class="font-semibold text-gray-700">Go to Mint</span>
                    <div class="bg-purple-accent text-white p-3 rounded-full group-hover:scale-110 transition-transform">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l10-10M7 7h10v10"/></svg>
                    </div>
                </button>
            </div>

            <div class="lg:col-span-4 flex justify-center relative">
                <div class="absolute -inset-4 bg-purple-100/50 blur-3xl rounded-full -z-10"></div>
                <img src="images/MINT WEBSITE PHONE.png" alt="Mint App" class="phone-mockup w-full max-w-[320px] drop-shadow-2xl">
            </div>

            <div class="lg:col-span-4 space-y-12">
                <div class="max-w-[280px]">
                    <div class="text-purple-500 mb-4">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <p class="text-gray-500 leading-relaxed text-lg">
                        Simplify your financial life. Our intuitive app makes managing your money effortless.
                    </p>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex -space-x-3">
                        <div class="w-12 h-12 rounded-full border-2 border-white bg-gray-200 overflow-hidden">
                            <img src="https://i.pravatar.cc/150?u=1" alt="User">
                        </div>
                        <div class="w-12 h-12 rounded-full border-2 border-white bg-gray-200 overflow-hidden">
                            <img src="https://i.pravatar.cc/150?u=2" alt="User">
                        </div>
                        <div class="w-12 h-12 rounded-full border-2 border-white bg-gray-200 overflow-hidden">
                            <img src="https://i.pravatar.cc/150?u=3" alt="User">
                        </div>
                    </div>
                    <div>
                        <div class="text-2xl font-bold">200+</div>
                        <p class="text-xs text-gray-400">Trusted by users over 140 countries</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-20 bg-purple-accent py-12 rotate-[-2deg] scale-105 overflow-hidden">
            <div class="carousel-track">
                <div class="flex gap-20 items-center px-10">
                    <span class="text-white text-7xl font-bold opacity-30 uppercase tracking-tighter italic">Invest</span>
                    <span class="text-white text-5xl opacity-50">•</span>
                    <span class="text-white text-7xl font-bold opacity-30 uppercase tracking-tighter italic">Borrow</span>
                    <span class="text-white text-5xl opacity-50">•</span>
                    <span class="text-white text-7xl font-bold opacity-30 uppercase tracking-tighter italic">Transact</span>
                    <span class="text-white text-5xl opacity-50">•</span>
                </div>
                <div class="flex gap-20 items-center px-10">
                    <span class="text-white text-7xl font-bold opacity-30 uppercase tracking-tighter italic">Invest</span>
                    <span class="text-white text-5xl opacity-50">•</span>
                    <span class="text-white text-7xl font-bold opacity-30 uppercase tracking-tighter italic">Borrow</span>
                    <span class="text-white text-5xl opacity-50">•</span>
                    <span class="text-white text-7xl font-bold opacity-30 uppercase tracking-tighter italic">Transact</span>
                    <span class="text-white text-5xl opacity-50">•</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function handleMintRedirect() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (isMobile) {
                // Replace with your actual app store link
                window.location.href = "https://mintapp.example.com/download";
            } else {
                alert("This application is available only on mobile devices. Please visit us from your phone!");
            }
        }
    </script>
</body>
</html>
