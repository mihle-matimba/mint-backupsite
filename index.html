<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint | Interactive Experience</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
            color: #000;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo img {
            height: 35px;
            width: auto;
            transition: transform 0.3s ease;
        }

        .logo:hover img {
            transform: scale(1.05);
        }

        /* Hamburger Animation */
        .menu-toggle {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 7px;
            padding: 10px;
        }

        .bar {
            width: 30px;
            height: 2px;
            background: #000;
            transition: 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            border-radius: 2px;
        }

        /* Morphing into X */
        .menu-toggle.active .bar:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .menu-toggle.active .bar:nth-child(2) {
            opacity: 0;
            transform: translateX(-10px);
        }
        .menu-toggle.active .bar:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        /* The Pinning Mechanism */
        .pin-container {
            height: 300vh; /* Scroll length for the animation */
            position: relative;
        }

        #hero {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Keeps image bottom-aligned */
            background: #fff;
        }

        .hero-image-wrapper {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .hero-image {
            width: 100%;
            height: auto;
            /* Initial state: 4x zoomed and pushed down 50% */
            transform: scale(4) translateY(50%);
            transform-origin: bottom center;
            will-change: transform;
        }

        /* Next Section */
        .next-section {
            height: 100vh;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .content-box h2 {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .content-box p {
            font-size: 1.2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="#hero" class="logo">
            <img src="images/ICON MINT.png" alt="Mint Logo">
        </a>
        <button class="menu-toggle" aria-label="Toggle Menu">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar :"></div>
        </button>
    </header>

    <div class="pin-container">
        <section id="hero">
            <div class="hero-image-wrapper">
                <img src="images/HERO MAIN IMG.png" alt="Hero Image" class="hero-image">
            </div>
        </section>
    </div>

    <section class="next-section">
        <div class="content-box">
            <h2>The Mint Standard</h2>
            <p>Wealth generation meets interaction design.</p>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const heroImage = document.querySelector('.hero-image');
            const pinContainer = document.querySelector('.pin-container');
            const menuToggle = document.querySelector('.menu-toggle');

            // 1. Hamburger Menu Toggle
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
            });

            // 2. Scroll Animation Logic
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                
                // Total distance we can scroll within the pinned container
                const maxScroll = pinContainer.offsetHeight - window.innerHeight;
                
                // Calculate progress (0 to 1)
                let progress = scrollY / maxScroll;

                // Keep progress within 0 and 1
                if (progress > 1) progress = 1;
                if (progress < 0) progress = 0;

                /**
                 * Transformation Math:
                 * Scale: Drops from 4 down to 1 (4 - 3 * progress)
                 * translateY: Moves from 50% up to 0% (50 - 50 * progress)
                 */
                const currentScale = 4 - (progress * 3);
                const currentY = 50 - (progress * 50);

                // Applying the transform with GPU acceleration
                heroImage.style.transform = `scale(${currentScale}) translateY(${currentY}%)`;
            });
        });
    </script>
</body>
</html>
