<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Branding</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <a href="#hero" class="logo">
            <img src="images/ICON MINT.png" alt="Mint Logo">
        </a>

        <button class="menu-toggle" aria-label="Toggle Menu">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </button>
    </header>

    <section id="hero">
        <img src="images/HERO MAIN IMG.png" alt="Hero Featured" class="hero-image">
    </section>

    <section class="content-spacer">
        <div class="placeholder-text">
            <h2>The Future of Mint</h2>
            <p>Scroll back up to see the effect.</p>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
