<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint - Coming Soon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --mint-primary: #00C48C; 
            --mint-hover: #00A374;
            --bg-body: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-main: #1D1D1F;
            --text-secondary: #86868B;
            --radius-lg: 24px;
            --radius-btn: 999px;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --ease-apple: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none; /* Let clicks pass through to 3D background if needed */
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-main);
            pointer-events: auto;
        }
        .logo span { color: var(--mint-primary); }

        .status-pill {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: var(--radius-btn);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid rgba(0,0,0,0.05);
            pointer-events: auto;
        }

        /* --- HERO SECTION --- */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            overflow: hidden;
        }

        /* The 3D Canvas sits behind the text */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0; /* Starts hidden for fade-in */
            animation: fadeIn 2s var(--ease-apple) forwards;
        }

        .hero-content {
            z-index: 10;
            max-width: 800px;
            /* Glass backing for text legibility over 3D object */
            background: rgba(245, 245, 247, 0.3);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #1D1D1F 0%, #4a4a4a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* --- CONTENT SECTION --- */
        .details-section {
            position: relative;
            z-index: 20;
            background: var(--bg-card);
            border-radius: 40px 40px 0 0;
            padding: 100px 20px;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.03);
            margin-top: -50px;
        }

        .content-wrapper {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .info-grid {
            display: grid;
            gap: 40px;
            margin-bottom: 60px;
        }

        .info-item h3 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .info-item p {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* --- BUTTONS --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 36px;
            border-radius: var(--radius-btn);
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.4s var(--ease-apple);
            cursor: pointer;
            border: none;
        }

        .btn-mint {
            background: var(--mint-primary);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 196, 140, 0.25);
        }

        .btn-mint:hover {
            transform: scale(1.02) translateY(-2px);
            background: var(--mint-hover);
            box-shadow: 0 20px 40px rgba(0, 196, 140, 0.35);
        }

        .btn-link {
            display: block;
            margin-top: 24px;
            color: var(--mint-primary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-link:hover { text-decoration: underline; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { to { opacity: 1; } }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s var(--ease-apple);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <header>
        <div class="logo">Mint<span>.</span></div>
        <div class="status-pill">Beta 2.0</div>
    </header>

    <section class="hero-container">
        <div class="hero-content reveal">
            <h1>Finance,<br>Refined.</h1>
            <p class="subtitle">A fresh approach to your daily spending.</p>
            <div style="height: 20px;"></div> <div style="opacity: 0.4; font-size: 0.8rem; margin-top: 20px;">
                Scroll to explore
            </div>
        </div>
    </section>

    <section class="details-section">
        <div class="content-wrapper reveal">
            <div class="info-grid">
                <div class="info-item">
                    <h3>Release Date</h3>
                    <p>End of February</p>
                </div>
                <div class="info-item">
                    <h3>Availability</h3>
                    <p>App Store & Google Play</p>
                </div>
            </div>

            <div style="background: #F9F9FA; padding: 40px; border-radius: 24px;">
                <h2 style="margin-bottom: 20px; font-size: 1.8rem;">Get Early Access</h2>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">
                    Skip the waitlist on Android. Download the beta build today.
                </p>
                
                <a href="YOUR_ANDROID_LINK_HERE" class="btn btn-mint">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.523 15.3414C17.523 16.738 16.3826 17.8732 14.9754 17.8732C13.5682 17.8732 12.433 16.738 12.433 15.3414C12.433 13.9449 13.5682 12.8097 14.9754 12.8097C16.3826 12.8097 17.523 13.9449 17.523 15.3414ZM8.24075 15.3414C8.24075 16.738 7.10037 17.8732 5.69317 17.8732C4.28597 17.8732 3.15075 16.738 3.15075 15.3414C3.15075 13.9449 4.28597 12.8097 5.69317 12.8097C7.10037 12.8097 8.24075 13.9449 8.24075 15.3414ZM18.4727 7.02554L20.2443 3.96166C20.3541 3.7702 20.2917 3.52349 20.0993 3.41178C19.9048 3.30335 19.6603 3.36701 19.5492 3.5592L17.7554 6.66223C16.0355 5.87539 14.1032 5.43883 12.043 5.43883C9.98275 5.43883 8.05047 5.87539 6.33056 6.66223L4.53678 3.5592C4.42566 3.36701 4.18005 3.30449 3.98671 3.41178C3.79449 3.52349 3.73204 3.7702 3.84183 3.96166L5.61337 7.02554C2.52047 8.71077 0.399536 11.8384 0.0526428 15.5428H24.0333C23.6864 11.8384 21.5655 8.71077 18.4727 7.02554Z" />
                    </svg>
                    Download for Android
                </a>
                
                <a href="YOUR_ANDROID_LINK_HERE" class="btn-link">I have an invite code</a>
            </div>
        </div>
    </section>

    <script>
        // --- SCROLL REVEAL ANIMATION ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));


        // --- THREE.JS SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        
        // 1. Scene & Camera
        const scene = new THREE.Scene();
        // Add subtle fog to blend the object into the background
        scene.fog = new THREE.FogExp2(0xF5F5F7, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // 2. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharpness on retina
        container.appendChild(renderer.domElement);

        // 3. Object: Abstract Torus Knot (Infinity Shape)
        // This looks like a modern art sculpture
        const geometry = new THREE.TorusKnotGeometry(1.2, 0.4, 150, 20);
        
        // "Physical" Material for glass/plastic apple look
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x00C48C,        // Mint Green
            metalness: 0.1,         // Low metal
            roughness: 0.2,         // Smooth
            transmission: 0.1,      // Slight see-through
            clearcoat: 1.0,         // Shiny top layer
            clearcoatRoughness: 0.1
        });

        const shape = new THREE.Mesh(geometry, material);
        scene.add(shape);

        // 4. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const blueLight = new THREE.PointLight(0x00C48C, 0.5);
        blueLight.position.set(-5, -2, -5);
        scene.add(blueLight);


        // 5. Interaction (Mouse Movement)
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // 6. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Constant gentle rotation
            shape.rotation.y += 0.005;
            shape.rotation.x += 0.002;

            // Mouse Interaction (Smooth easing)
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            shape.rotation.y += 0.05 * (targetX - shape.rotation.y);
            shape.rotation.x += 0.05 * (targetY - shape.rotation.x);

            // Floating bobbing effect
            shape.position.y = Math.sin(elapsedTime * 0.5) * 0.2;

            renderer.render(scene, camera);
        }

        animate();

        // 7. Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
